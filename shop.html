<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — PhoneBank</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
body { background: #f5f5f7; color: #111; }
a { text-decoration: none; }

/* Navigation — same as Home/Sell */
.nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); }
.nav-inner { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; max-width: 1200px; margin: 0 auto; }
.nav-links a { color: #111; font-weight: 600; margin-left: 32px; transition: color .2s; }
.nav-links a:hover { color: #0a66ff; }

/* Layout */
.shop-container { display: flex; gap: 40px; padding: 130px 40px 80px; max-width: 1280px; margin: 0 auto; align-items: flex-start; }

/* Sidebar */
.sidebar { width: 260px; flex-shrink: 0; position: sticky; top: 110px; background: #fff; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
.sidebar h3 { font-size: 1.2rem; margin-bottom: 20px; }
.filter-group { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid #f0f0f0; }
.filter-group:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.filter-group h4 { margin-bottom: 10px; font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: #888; }
.sidebar select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e2e7; font-size: .95rem; background: #fafafa; cursor: pointer; color: #111; }

.toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: .92rem; font-weight: 600; color: #333; }
.toggle-row:last-child { margin-bottom: 0; }
.switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #d5d5da; transition: .3s; border-radius: 24px; }
.slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; transition: .3s; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
input:checked + .slider { background: #0a66ff; }
input:checked + .slider:before { transform: translateX(20px); }

/* Main content */
.main-content { flex: 1; min-width: 0; }
.page-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
.page-header h1 { font-size: 2.3rem; font-weight: 800; letter-spacing: -1px; }
.page-header .sub { color: #666; margin-top: 4px; }
#result-count { color: #888; font-size: .92rem; font-weight: 600; }

/* Product grid — the professional bit: strict equal cards */
#shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 22px; }

/* Modal */
#product-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(5px); padding: 20px; }
.modal-box { background: #fff; padding: 32px; border-radius: 18px; width: 100%; max-width: 860px; max-height: 88vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 32px; position: relative; }
.modal-close { position: absolute; top: 14px; right: 18px; cursor: pointer; background: none; border: none; font-size: 2rem; line-height: 1; color: #888; }
.modal-close:hover { color: #111; }

footer { text-align: center; padding: 44px 20px; color: #888; font-size: .9rem; border-top: 1px solid #e8e8ec; background: #fff; }

/* Mobile */
@media (max-width: 820px) {
  .shop-container { flex-direction: column; padding: 120px 20px 60px; }
  .sidebar { width: 100%; position: static; }
}
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" style="font-weight:800; font-size:1.5rem; letter-spacing:-0.5px; color:#111;">Phone<span style="color:#0a66ff;">Bank</span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html" style="color:#0a66ff;">Shop</a>
      <a href="sell.html">Sell</a>
      <a href="grading.html">Grading</a>
    </nav>
  </div>
</header>

<main class="shop-container">

  <aside class="sidebar">
    <h3>Filters</h3>

    <div class="filter-group">
      <h4>Category</h4>
      <select id="filter-type">
        <option value="">All Categories</option>
        <option value="Phone">Smartphones</option>
        <option value="Accessory">Accessories</option>
      </select>
    </div>

    <div class="filter-group">
      <h4>Brand</h4>
      <select id="filter-brand">
        <option value="">All Brands</option>
        <option value="Apple">Apple</option>
        <option value="Samsung">Samsung</option>
        <option value="Google">Google</option>
        <option value="PhoneBank">PhoneBank</option>
      </select>
    </div>

    <div class="filter-group">
      <h4>Availability &amp; Pricing</h4>
      <div class="toggle-row">
        <span>Show Out of Stock</span>
        <label class="switch"><input type="checkbox" id="toggle-stock"><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <span>Show Trade-in Prices</span>
        <label class="switch"><input type="checkbox" id="toggle-trade"><span class="slider"></span></label>
      </div>
    </div>
  </aside>

  <section class="main-content">
    <div class="page-header">
      <div>
        <h1 id="page-title">All Devices</h1>
        <p class="sub">Premium refurbished devices — every grade explained.</p>
      </div>
      <span id="result-count"></span>
    </div>

    <div id="shop-grid"></div>
  </section>

</main>

<div id="product-modal">
  <div class="modal-box">
    <button onclick="closeModal()" class="modal-close">&times;</button>
    <div style="flex:1; min-width:280px;"><img id="modal-image" src="" alt="" style="width:100%; border-radius:12px; background:#f5f5f7;"></div>
    <div id="modal-details-content" style="flex:1; min-width:280px;"></div>
  </div>
</div>

<footer>PhoneBank — Concept project, not a real store. Built by Poonam Nauroji.</footer>

<script>

</script>
<script src="shop.js"></script>
